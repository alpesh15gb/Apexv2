version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: apex_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-apex}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-apex_secret}
      POSTGRES_DB: ${POSTGRES_DB:-apex_db}
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U apex -d apex_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - apex_network

  redis:
    image: redis:7-alpine
    container_name: apex_redis
    ports:
      - "127.0.0.1:6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - apex_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: apex_backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - uploads_data:/app/uploads
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - apex_network

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: apex_celery_worker
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=4
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - apex_network

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: apex_celery_beat
    command: celery -A app.tasks.celery_app beat --loglevel=info
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - apex_network

volumes:
  postgres_data:
  redis_data:
  uploads_data:

networks:
  apex_network:
    driver: bridge
