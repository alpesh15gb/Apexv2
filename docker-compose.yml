version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: apex_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-apex}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-apex_secret}
      POSTGRES_DB: ${POSTGRES_DB:-apex_db}
    ports:
      - "127.0.0.1:5434:5432"
    volumes:
      - apex_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U apex -d apex_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - apex_network

  redis:
    image: redis:7-alpine
    container_name: apex_redis
    command: redis-server --appendonly yes
    ports:
      - "127.0.0.1:6380:6379"
    volumes:
      - apex_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - apex_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: apex_backend
    command: >
      sh -c "
        celery -A app.tasks.celery_app worker --loglevel=info --concurrency=2 &
        celery -A app.tasks.celery_app beat --loglevel=info &
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4
      "
    ports:
      - "127.0.0.1:8001:8000"
    volumes:
      - apex_uploads_data:/app/uploads
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - apex_network

volumes:
  apex_postgres_data:
  apex_redis_data:
  apex_uploads_data:

networks:
  apex_network:
    driver: bridge
