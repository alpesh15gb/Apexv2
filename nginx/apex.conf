# next.apextime.in — Apex HRMS
# No collision with apextime.in (5003/8082) or apextime.cloud (5001/3000)
# Backend: 127.0.0.1:8001 | Frontend: served directly by Nginx

server {
    listen 80;
    server_name next.apextime.in;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name next.apextime.in;

    ssl_certificate /etc/letsencrypt/live/next.apextime.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/next.apextime.in/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 50M;

    # Frontend — Flutter web build
    root /var/www/apexhrms/frontend/build/web;
    index index.html;

    # API proxy → Docker backend on port 8001
    location /api/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
        proxy_connect_timeout 30s;
    }

    # WebSocket proxy
    location /ws/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
    }

    # Flutter SPA — serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}
